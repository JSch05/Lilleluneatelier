<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="title">Produkt – lilleluneatelier</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html">
    <img class="brand-logo" src="assets/img/logo.jpg" alt="lilleluneatelier Logo">
    <span class="brand-text">lilleluneatelier</span>
  </a>
  <nav class="nav">
    <a href="products.html">Shop</a>
    <a href="about.html">Über uns</a>
    <a href="contact.html">Kontakt</a>
  </nav>
</header>

<main class="container">
  <div class="product-page">
    <div class="product-media">
      <img id="prod-image" src="assets/img/placeholder.jpg" alt="Produktbild">
      <div id="thumbs" class="thumbs"></div>
    </div>
    <div class="product-info">
      <h1 id="prod-name">Produktname</h1>
      <p id="prod-price" class="price"></p>
      <p id="prod-desc"></p>

      <div class="options">
        <label>Farbe
          <select id="opt-color"></select>
        </label>
        <label>Größe
          <select id="opt-size"></select>
        </label>
      </div>

      <div class="actions">
        <a id="buy-btn" class="btn btn-primary" href="#">Anfrage senden</a>
        <!-- Optional: später Stripe/Buy Button einbauen -->
      </div>
      <p class="note">Handgemacht auf Bestellung – Lieferzeit 5–10 Werktage.</p>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>© <span id="year"></span> lilleluneatelier</p>
  <nav><a href="legal.html">Impressum & Rechtliches</a></nav>
</footer>
<script src="assets/js/app.js"></script>
</body>
</html>
